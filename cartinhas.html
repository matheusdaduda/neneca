<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cartinhas 💌</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#ffc1dc,#ffd6e7,#ffeaf4);
      padding:40px;
      overflow:hidden;
    }

    h1{
      color:white;
      margin-bottom:40px;
      font-size:42px;
      text-shadow:0 4px 10px rgba(0,0,0,0.15);
    }

    .letters{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:30px;
      max-width:900px;
    }

    .letter-icon{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      cursor:pointer;
      transition:0.3s;
    }

    .letter-icon:hover{
      transform:scale(1.05);
    }

    .icon-box{
      width:100px;
      height:100px;
      border-radius:25px;
      background:rgba(255,255,255,0.25);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.4);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:45px;
      color:white;
      box-shadow:0 10px 20px rgba(0,0,0,0.08);
    }

    .letter-icon span{
      color:white;
      font-weight:bold;
      text-align:center;
      text-shadow:0 2px 5px rgba(0,0,0,0.2);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(255,192,203,0.45);
      backdrop-filter:blur(12px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    .modal-box{
      width:90%;
      max-width:650px;
      background:rgba(255,255,255,0.25);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.4);
      border-radius:35px;
      overflow:hidden;
      box-shadow:0 20px 40px rgba(0,0,0,0.15);
    }

    .modal-top{
      height:50px;
      background:rgba(255,255,255,0.15);
      border-bottom:1px solid rgba(255,255,255,0.3);
      display:flex;
      align-items:center;
      padding:0 18px;
      gap:8px;
    }

    .circle{
      width:12px;
      height:12px;
      border-radius:50%;
    }

    .red{background:#ff8b8b;}
    .yellow{background:#ffd66b;}
    .green{background:#7dff95;}

    .modal-content{
      padding:35px;
      color:#8a3b63;
      line-height:1.8;
    }

    .modal-content h2{
      color:#d63384;
      margin-bottom:20px;
      font-size:32px;
    }

    .close-btn{
      margin-top:25px;
      border:none;
      background:#ff4fa0;
      color:white;
      padding:14px 24px;
      border-radius:18px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .close-btn:hover{
      background:#ff2f91;
      transform:scale(1.05);
    }

  </style>
</head>
<body>

  <h1>💌 cartinhas da neneca</h1>

  <div class="letters">

    <div class="letter-icon" onclick="carta1()">
      <div class="icon-box">💌</div>
      <span>cartinha 1</span>
    </div>

    <div class="letter-icon" onclick="carta2()">
      <div class="icon-box">💗</div>
      <span>cartinha 2..</span>
    </div>

  </div>

  
 

  <script>

 function carta1(){
 
      window.location.href ="https://matheusdaduda.github.io/neneca/carta1.html"

}

 function carta2(){
 
      window.location.href ="https://matheusdaduda.github.io/neneca/carta2.html"

}

  </script>

</body>
</html>
