<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quebra cabeça</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffc1dc, #ffd6e7, #ffeaf4);
      overflow: hidden;
      padding: 20px;
    }

    h1 {
      color: white;
      margin-bottom: 10px;
      font-size: 42px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    p {
      color: white;
      margin-bottom: 30px;
      text-align: center;
    }

    .puzzle-container {
      width: 420px;
      height: 420px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      padding: 10px;
      border-radius: 30px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .piece {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.3);
      transition: 0.2s;
      background-repeat: no-repeat;
    }

    .piece:hover {
      transform: scale(1.03);
    }

    .piece.selected {
      transform: scale(0.95);
      opacity: 0.6;
      border: 3px solid white;
    }

    .message {
      margin-top: 25px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      min-height: 30px;
    }

    .button {
      margin-top: 20px;
      border: none;
      background: #ff4fa0;
      color: white;
      padding: 14px 24px;
      border-radius: 18px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      font-size: 16px;
    }

    .button:hover {
      background: #ff2f91;
      transform: scale(1.05);
    }

    .win-screen {
      position: fixed;
      inset: 0;
      background: rgba(255,182,193,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(15px);
    }

    .win-box {
      background: rgba(255,255,255,0.25);
      padding: 40px;
      border-radius: 35px;
      text-align: center;
      color: white;
      width: 90%;
      max-width: 500px;
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .win-box h2 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    .win-box p {
      font-size: 18px;
      line-height: 1.6;
    }

    @media (max-width: 500px) {
      .puzzle-container {
        width: 90vw;
        height: 90vw;
      }
    }
  </style>
</head>
<body>

  <h1>quebra cabeça 🧩</h1>
  <p>clique em duas peças para trocar de lugar 💗</p>

  <div class="puzzle-container" id="puzzle"></div>

  <div class="message" id="message"></div>

  <button class="button" onclick="shufflePieces()">
    embaralhar novamente ✨
  </button>

  <div class="win-screen" id="winScreen">
    <div class="win-box">
      <h2>PARABÉNS AMOR!!!!!!</h2>

      <p>
        VOCE CONSEGUIU MESMO!!11!@@<br><br>
        Eu te amo mais que tudo
      </p>

      <button class="button" onclick="closeWinScreen()">
        fechar ✨
      </button>
    </div>
  </div>

  <script>

    const image = 'foto.jpg';

    const puzzle = document.getElementById('puzzle');
    const message = document.getElementById('message');
    const winScreen = document.getElementById('winScreen');

    let pieces = [];
    let selectedPiece = null;

    function createPuzzle() {

      pieces = [];
      puzzle.innerHTML = '';

      const pieceSize = puzzle.offsetWidth / 3;

      for(let row = 0; row < 3; row++) {

        for(let col = 0; col < 3; col++) {

          const piece = document.createElement('div');

          piece.classList.add('piece');

          const correctIndex = row * 3 + col;

          piece.dataset.correct = correctIndex;

          piece.style.backgroundImage = `url(${image})`;

          piece.style.backgroundSize =
          `${pieceSize * 3}px ${pieceSize * 3}px`;

          piece.style.backgroundPosition =
          `${-col * pieceSize}px ${-row * pieceSize}px`;

          piece.addEventListener('click', selectPiece);

          pieces.push(piece);

          puzzle.appendChild(piece);
        }
      }

      shufflePieces();
    }

    function shufflePieces() {

      for(let i = pieces.length - 1; i > 0; i--) {

        const j = Math.floor(Math.random() * (i + 1));

        [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
      }

      renderPuzzle();

      message.textContent = '';
    }

    function renderPuzzle() {

      puzzle.innerHTML = '';

      pieces.forEach(piece => {
        puzzle.appendChild(piece);
      });
    }

    function selectPiece() {

      if(selectedPiece === null) {

        selectedPiece = this;

        this.classList.add('selected');

      } else {

        if(selectedPiece === this) {

          this.classList.remove('selected');

          selectedPiece = null;

          return;
        }

        const firstIndex = pieces.indexOf(selectedPiece);
        const secondIndex = pieces.indexOf(this);

        [pieces[firstIndex], pieces[secondIndex]] =
        [pieces[secondIndex], pieces[firstIndex]];

        selectedPiece.classList.remove('selected');

        selectedPiece = null;

        renderPuzzle();

        checkWin();
      }
    }

    function checkWin() {

      const win = pieces.every((piece, index) => {

        return Number(piece.dataset.correct) === index;
      });

      if(win) {

        message.textContent = 'PARABENSSSS 💖';

        winScreen.style.display = 'flex';
      }
    }

    function closeWinScreen() {

      winScreen.style.display = 'none';
    }

    createPuzzle();

    window.addEventListener('resize', () => {
      createPuzzle();
    });

  </script>

</body>
</html>
